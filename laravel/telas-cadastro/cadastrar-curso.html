<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar Curso</title>

    <!-- CSS do Bootstrap 5 via CDN. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-3">
                <div class="card shadow m-3">
                    <div class="card-body">
                        <div class="form-group">
                            <label for="nome" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="nome" name="nome" required>
                        </div>

                        <button class="btn btn-primary mt-3" id="btn-cadastrar">
                            Cadastrar Curso
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript do Bootstrap 5 via CDN. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Captura o clique do botao sem usar a tag form.
        document.getElementById('btn-cadastrar').addEventListener('click', function () {
            const nome = document.getElementById('nome').value;

            // Envia os dados para a API no formato JSON.
            fetch('http://127.0.0.1:8000/api/curso/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ nome })
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Erro HTTP: ' + response.status);
                    }

                    return response.json();
                })
                .then(data => {
                    if (data.errors) {
                        alert('Erro ao cadastrar curso.');
                        console.error(data.errors);
                    } else {
                        alert('Curso cadastrado com sucesso.');
                        console.log(data);
                    }
                })
                .catch(error => {
                    alert('Erro de comunicacao com a API.');
                    console.error(error);
                });
        });
    </script>
</body>
</html>
